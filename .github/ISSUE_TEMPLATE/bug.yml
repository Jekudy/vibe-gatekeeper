name: Bug Report
description: Report a defect or unexpected behavior.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens. Include stack traces or log snippets if available.
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "critical – data loss / privacy violation / gatekeeper down"
        - "high – major feature broken"
        - "medium – degraded behavior, workaround exists"
        - "low – cosmetic / minor"
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      description: e.g. local DEV_MODE=true, staging, production; Python version; Docker image tag.
      placeholder: "local, DEV_MODE=true, Python 3.12, image sha abc1234"
    validations:
      required: true
